<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>AI Insight Daily — 报告目录</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;700&family=Inter:wght@400;500;600;700&display=swap');
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Noto Serif SC','Georgia',serif;background:#f8f8f6;color:#1a1a1a;min-height:100vh}
.header{background:#1a1a1a;color:#fff;padding:1.5rem 2rem;display:flex;align-items:center;gap:1rem}
.logo{width:40px;height:40px;background:linear-gradient(135deg,#f59e0b,#ef4444);border-radius:9px;display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0}
.brand-name{font-family:'Inter',sans-serif;font-size:1.1rem;font-weight:700}
.brand-sub{font-family:'Inter',sans-serif;font-size:0.7rem;color:#94a3b8;letter-spacing:.05em;text-transform:uppercase;margin-top:.15rem}
.container{max-width:700px;margin:3rem auto;padding:0 1.5rem}
.section-title{font-family:'Inter',sans-serif;font-size:.7rem;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:#aaa;margin-bottom:1.25rem;padding-bottom:.5rem;border-bottom:1px solid #e5e5e0}
.report-card{display:block;text-decoration:none;background:#fff;border:1px solid #e5e5e0;border-radius:8px;padding:1.25rem 1.5rem;margin-bottom:.9rem;transition:box-shadow .15s,border-color .15s}
.report-card:hover{box-shadow:0 4px 16px rgba(0,0,0,.08);border-color:#ccc}
.card-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:.5rem}
.card-date{font-family:'Inter',sans-serif;font-size:1rem;font-weight:700;color:#0f172a}
.card-score{font-family:'Inter',sans-serif;font-size:.78rem;font-weight:600;background:#fff8e6;border:1px solid #f0d070;color:#7a5c00;padding:.2rem .55rem;border-radius:20px}
.card-summary{font-size:.92rem;color:#475569;line-height:1.7}
.card-meta{font-family:'Inter',sans-serif;font-size:.72rem;color:#bbb;margin-top:.6rem;display:flex;gap:.8rem}
.footer{font-family:'Inter',sans-serif;font-size:.75rem;color:#ccc;text-align:center;padding:2.5rem 1rem}
</style>
</head>
<body>
<header class="header">
  <div class="logo">⚡</div>
  <div>
    <div class="brand-name">AI Insight Daily</div>
    <div class="brand-sub">AI-curated daily digest</div>
  </div>
</header>
<div class="container">
  <div class="section-title">历史日报</div>

  <a class="report-card" href="data/output/2026-04-10/report.html">
    <div class="card-top">
      <span class="card-date">2026-04-10</span>
      <span class="card-score">⭐ avg 8.8</span>
    </div>
    <div class="card-summary">字节Seed与北大发布In-Place TTT，实现大模型运行时按需自动加层即时自适应...</div>
    <div class="card-meta"><span>处理 7 条</span><span>精选 7 条</span><span>商业资本</span></div>
  </a>

  <a class="report-card" href="data/output/2026-04-09/report.html">
    <div class="card-top">
      <span class="card-date">2026-04-09</span>
      <span class="card-score">⭐ avg 7.8</span>
    </div>
    <div class="card-summary">Anthropic 发布 Claude Mythos Preview 与 Project Glasswing，聚焦关键软件安全...</div>
    <div class="card-meta"><span>处理 4 条</span><span>精选 4 条</span><span>技术突破</span></div>
  </a>

</div>
<footer class="footer">AI Insight Daily · Powered by Claude</footer>
</body>
</html>
